<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>لوحة التحكم | محمد لحلح</title>
  <link rel="icon" href="/favicon.ico" type="image/x-icon" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap');
    body {
      font-family: 'IBM Plex Sans Arabic', sans-serif;
      margin: 0;
    }
    #loading {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-size: 1.2rem;
      color: #666;
    }
  </style>
</head>
<body>
  <div id="loading">⏳ جاري تحميل لوحة التحكم...</div>

  <script>
    // Wait for DOM to be fully ready, then load Decap CMS dynamically
    document.addEventListener('DOMContentLoaded', function() {
      var script = document.createElement('script');
      script.src = 'https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js';
      script.onload = function() {
        // Remove loading indicator
        var el = document.getElementById('loading');
        if (el) el.remove();

        // Initialize CMS with inline config
        if (window.CMS) {
          window.CMS.init({
            config: {
              backend: {
                name: "github",
                repo: "purity091/personal-blog",
                branch: "main"
              },
              media_folder: "public/blog",
              public_folder: "/blog",
              site_url: "https://mlahlah.vercel.app",
              display_url: "https://mlahlah.vercel.app",
              collections: [
                {
                  name: "blog",
                  label: "\uD83D\uDCDD المقالات",
                  label_singular: "مقال جديد",
                  folder: "src/content/blog",
                  create: true,
                  slug: "{{slug}}",
                  editor: { preview: true },
                  fields: [
                    {
                      label: "العنوان",
                      name: "title",
                      widget: "string",
                      required: true
                    },
                    {
                      label: "الوصف المختصر",
                      name: "description",
                      widget: "string",
                      required: true
                    },
                    {
                      label: "تاريخ النشر",
                      name: "date",
                      widget: "datetime",
                      required: true,
                      format: "YYYY-MM-DD",
                      date_format: "YYYY-MM-DD",
                      time_format: false
                    },
                    {
                      label: "تاريخ آخر تحديث",
                      name: "updatedDate",
                      widget: "datetime",
                      required: false,
                      format: "YYYY-MM-DD",
                      date_format: "YYYY-MM-DD",
                      time_format: false
                    },
                    {
                      label: "الصورة البارزة",
                      name: "image",
                      widget: "object",
                      required: false,
                      collapsed: false,
                      fields: [
                        {
                          label: "مسار الصورة",
                          name: "src",
                          widget: "image",
                          required: true
                        },
                        {
                          label: "الوصف البديل",
                          name: "alt",
                          widget: "string",
                          required: false,
                          default: "صورة المقال"
                        }
                      ]
                    },
                    {
                      label: "الوسوم",
                      name: "tags",
                      widget: "list",
                      required: false,
                      default: []
                    },
                    {
                      label: "التصنيف",
                      name: "category",
                      widget: "select",
                      required: true,
                      default: "الذكاء الاصطناعي",
                      options: [
                        { label: "الذكاء الاصطناعي", value: "الذكاء الاصطناعي" },
                        { label: "التعلم العميق", value: "التعلم العميق" },
                        { label: "معالجة اللغات الطبيعية", value: "معالجة اللغات الطبيعية" },
                        { label: "الرؤية الحاسوبية", value: "الرؤية الحاسوبية" },
                        { label: "الشبكات العصبية", value: "الشبكات العصبية" },
                        { label: "Transformers", value: "Transformers" },
                        { label: "ChatGPT", value: "ChatGPT" },
                        { label: "Python", value: "Python" },
                        { label: "أدوات وتقنيات", value: "أدوات وتقنيات" },
                        { label: "مشاريع عملية", value: "مشاريع عملية" }
                      ]
                    },
                    {
                      label: "وقت القراءة (بالدقائق)",
                      name: "readingTime",
                      widget: "number",
                      required: false,
                      value_type: "int",
                      min: 1,
                      max: 60
                    },
                    {
                      label: "مقال مميز",
                      name: "featured",
                      widget: "boolean",
                      default: false
                    },
                    {
                      label: "مسودة",
                      name: "draft",
                      widget: "boolean",
                      default: true
                    },
                    {
                      label: "محتوى المقال",
                      name: "body",
                      widget: "markdown",
                      required: true
                    }
                  ]
                }
              ]
            }
          });
        }
      };
      document.body.appendChild(script);
    });
  </script>
</body>
</html>
