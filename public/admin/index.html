<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>لوحة التحكم | محمد لحلح</title>
  <link rel="icon" href="data:," />
</head>
<body>
  <!--
    IMPORTANT: Script must be in <body> - Decap CMS v3 calls
    document.body.appendChild() immediately on load, so body must exist first.
    The inline config below prevents the /config.yml 404 error.
  -->
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
    CMS.init({
      config: {
        load_config_file: false,
        backend: {
          name: "github",
          repo: "purity091/personal-blog",
          branch: "main"
        },
        media_folder: "public/blog",
        public_folder: "/blog",
        site_url: "https://mlahlah.vercel.app",
        display_url: "https://mlahlah.vercel.app",
        collections: [
          {
            name: "blog",
            label: "المقالات",
            label_singular: "مقال جديد",
            folder: "src/content/blog",
            create: true,
            slug: "{{slug}}",
            fields: [
              { label: "العنوان", name: "title", widget: "string", required: true },
              { label: "الوصف المختصر", name: "description", widget: "string", required: true },
              {
                label: "تاريخ النشر",
                name: "date",
                widget: "datetime",
                required: true,
                format: "YYYY-MM-DD",
                date_format: "YYYY-MM-DD",
                time_format: false
              },
              {
                label: "الصورة البارزة",
                name: "image",
                widget: "object",
                required: false,
                fields: [
                  { label: "مسار الصورة", name: "src", widget: "image", required: true },
                  { label: "الوصف البديل", name: "alt", widget: "string", required: false, default: "صورة المقال" }
                ]
              },
              { label: "الوسوم", name: "tags", widget: "list", required: false, default: [] },
              {
                label: "التصنيف",
                name: "category",
                widget: "select",
                required: true,
                default: "الذكاء الاصطناعي",
                options: [
                  { label: "الذكاء الاصطناعي", value: "الذكاء الاصطناعي" },
                  { label: "التعلم العميق", value: "التعلم العميق" },
                  { label: "معالجة اللغات الطبيعية", value: "معالجة اللغات الطبيعية" },
                  { label: "الرؤية الحاسوبية", value: "الرؤية الحاسوبية" },
                  { label: "الشبكات العصبية", value: "الشبكات العصبية" },
                  { label: "Transformers", value: "Transformers" },
                  { label: "ChatGPT", value: "ChatGPT" },
                  { label: "Python", value: "Python" },
                  { label: "أدوات وتقنيات", value: "أدوات وتقنيات" },
                  { label: "مشاريع عملية", value: "مشاريع عملية" }
                ]
              },
              { label: "وقت القراءة (دقائق)", name: "readingTime", widget: "number", required: false, value_type: "int", min: 1, max: 60 },
              { label: "مقال مميز", name: "featured", widget: "boolean", default: false },
              { label: "مسودة", name: "draft", widget: "boolean", default: true },
              { label: "محتوى المقال", name: "body", widget: "markdown", required: true }
            ]
          }
        ]
      }
    });
  </script>
</body>
</html>
