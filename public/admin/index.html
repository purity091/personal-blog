<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>لوحة التحكم | محمد لحلح</title>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap');
    
    body {
      font-family: 'IBM Plex Sans Arabic', sans-serif;
    }
  </style>
</head>
<body>
  <!-- Decap CMS mounts to body automatically -->
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
    // Explicitly initialize with config to avoid config.yml 404
    CMS.init({
      config: {
        backend: {
          name: "github",
          repo: "purity091/personal-blog",
          branch: "main",
          base_url: "https://mlahlah.vercel.app",
          auth_endpoint: "/auth/github",
          commit_messages: {
            create: "feat(content): إنشاء مقال جديد '{{slug}}'",
            update: "feat(content): تحديث مقال '{{slug}}'",
            delete: "chore(content): حذف مقال '{{slug}}'",
            uploadMedia: "feat(media): رفع ملف {{path}}",
            deleteMedia: "chore(media): حذف ملف {{path}}"
          }
        },
        media_folder: "public/blog",
        public_folder: "/blog",
        site_url: "https://mlahlah.vercel.app",
        display_url: "https://mlahlah.vercel.app",
        collections: [
          {
            name: "blog",
            label: "📝 المقالات",
            label_singular: "مقال جديد",
            folder: "src/content/blog",
            create: true,
            slug: "{{slug}}",
            editor: { preview: true },
            fields: [
              {
                label: "العنوان *",
                name: "title",
                widget: "string",
                required: true,
                hint: "عنوان جذاب للمقال (أقل من 100 حرف)"
              },
              {
                label: "الوصف المختصر *",
                name: "description",
                widget: "string",
                required: true,
                hint: "وصف مختصر للـ SEO (أقل من 200 حرف)"
              },
              {
                label: "تاريخ النشر *",
                name: "date",
                widget: "datetime",
                required: true,
                format: "YYYY-MM-DD",
                date_format: "YYYY-MM-DD",
                time_format: false,
                hint: "متى سيتم نشر المقال"
              },
              {
                label: "تاريخ آخر تحديث",
                name: "updatedDate",
                widget: "datetime",
                required: false,
                format: "YYYY-MM-DD",
                date_format: "YYYY-MM-DD",
                time_format: false
              },
              {
                label: "الصورة البارزة",
                name: "image",
                widget: "object",
                required: false,
                collapsed: false,
                fields: [
                  {
                    label: "مسار الصورة",
                    name: "src",
                    widget: "image",
                    required: true,
                    hint: "ارفع صورة أو أدخل المسار"
                  },
                  {
                    label: "الوصف البديل (Alt)",
                    name: "alt",
                    widget: "string",
                    required: false,
                    default: "صورة المقال",
                    hint: "وصف الصورة لـ SEO"
                  }
                ]
              },
              {
                label: "الوسوم",
                name: "tags",
                widget: "list",
                required: false,
                default: [],
                hint: "وسوم للمقال (اضغط Enter لإضافة وسم)"
              },
              {
                label: "التصنيف *",
                name: "category",
                widget: "select",
                required: true,
                default: "الذكاء الاصطناعي",
                options: [
                  { label: "🤖 الذكاء الاصطناعي", value: "الذكاء الاصطناعي" },
                  { label: "🧠 التعلم العميق", value: "التعلم العميق" },
                  { label: "💬 معالجة اللغات الطبيعية", value: "معالجة اللغات الطبيعية" },
                  { label: "👁️ الرؤية الحاسوبية", value: "الرؤية الحاسوبية" },
                  { label: "🕸️ الشبكات العصبية", value: "الشبكات العصبية" },
                  { label: "⚡ Transformers", value: "Transformers" },
                  { label: "💡 ChatGPT", value: "ChatGPT" },
                  { label: "🐍 Python", value: "Python" },
                  { label: "🛠️ أدوات وتقنيات", value: "أدوات وتقنيات" },
                  { label: "🚀 مشاريع عملية", value: "مشاريع عملية" }
                ]
              },
              {
                label: "وقت القراءة (بالدقائق)",
                name: "readingTime",
                widget: "number",
                required: false,
                value_type: "int",
                min: 1,
                max: 60,
                hint: "كم دقيقة يستغرق قراءة المقال؟"
              },
              {
                label: "⭐ مقال مميز",
                name: "featured",
                widget: "boolean",
                default: false,
                hint: "هل تريد إبراز هذا المقال في الصفحة الرئيسية؟"
              },
              {
                label: "📝 مسودة",
                name: "draft",
                widget: "boolean",
                default: true,
                hint: "اتركه مفعلاً حتى تنشر المقال. ألغِ التفعيل للنشر!"
              },
              {
                label: "محتوى المقال *",
                name: "body",
                widget: "markdown",
                required: true,
                hint: "اكتب مقالك هنا باستخدام Markdown"
              }
            ]
          }
        ]
      }
    });
  </script>
</body>
</html>
