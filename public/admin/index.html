<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>لوحة التحكم | محمد لحلح</title>
  <link rel="icon" href="data:," />

  <!-- ✅ This tells Decap CMS exactly where to find the config, solving the 404 error perfectly! -->
  <link href="/admin/config.yml" type="text/yaml" rel="cms-config-url">

  <!-- Include Netlify Identity widget (optional but recommended for some setups) -->
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>
  <!-- Container for CMS -->
  <div id="nc-root"></div>

  <!-- ✅ The "defer" attribute is CRITICAL here. It ensures the script runs AFTER the document body is created, completely solving the "document.body is null" error. -->
  <script defer src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
</body>
</html>
