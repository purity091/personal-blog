backend:
  name: github
  repo: purity091/personal-blog
  branch: main

media_folder: "public/blog"
public_folder: "/blog"

site_url: https://mlahlah.vercel.app
display_url: https://mlahlah.vercel.app

collections:
  - name: "blog"
    label: "📝 المقالات"
    label_singular: "مقال جديد"
    folder: "src/content/blog"
    create: true
    slug: "{{slug}}"
    editor:
      preview: true
    fields:
      - label: "العنوان *"
        name: "title"
        widget: "string"
        required: true
        hint: "عنوان جذاب للمقال (أقل من 100 حرف)"

      - label: "الوصف المختصر *"
        name: "description"
        widget: "string"
        required: true
        hint: "وصف مختصر للـ SEO (أقل من 200 حرف)"

      - label: "تاريخ النشر *"
        name: "date"
        widget: "datetime"
        required: true
        format: "YYYY-MM-DD"
        date_format: "YYYY-MM-DD"
        time_format: false

      - label: "تاريخ آخر تحديث"
        name: "updatedDate"
        widget: "datetime"
        required: false
        format: "YYYY-MM-DD"
        date_format: "YYYY-MM-DD"
        time_format: false

      - label: "الصورة البارزة"
        name: "image"
        widget: "object"
        required: false
        collapsed: false
        fields:
          - label: "مسار الصورة"
            name: "src"
            widget: "image"
            required: true
          - label: "الوصف البديل (Alt)"
            name: "alt"
            widget: "string"
            required: false
            default: "صورة المقال"

      - label: "الوسوم"
        name: "tags"
        widget: "list"
        required: false
        default: []
        field:
          label: "وسم"
          name: "tag"
          widget: "string"

      - label: "التصنيف *"
        name: "category"
        widget: "select"
        required: true
        default: "الذكاء الاصطناعي"
        options:
          - label: "🤖 الذكاء الاصطناعي"
            value: "الذكاء الاصطناعي"
          - label: "🧠 التعلم العميق"
            value: "التعلم العميق"
          - label: "💬 معالجة اللغات الطبيعية"
            value: "معالجة اللغات الطبيعية"
          - label: "👁️ الرؤية الحاسوبية"
            value: "الرؤية الحاسوبية"
          - label: "🕸️ الشبكات العصبية"
            value: "الشبكات العصبية"
          - label: "⚡ Transformers"
            value: "Transformers"
          - label: "💡 ChatGPT"
            value: "ChatGPT"
          - label: "🐍 Python"
            value: "Python"
          - label: "🛠️ أدوات وتقنيات"
            value: "أدوات وتقنيات"
          - label: "🚀 مشاريع عملية"
            value: "مشاريع عملية"

      - label: "وقت القراءة (بالدقائق)"
        name: "readingTime"
        widget: "number"
        required: false
        value_type: "int"
        min: 1
        max: 60

      - label: "⭐ مقال مميز"
        name: "featured"
        widget: "boolean"
        default: false

      - label: "📝 مسودة"
        name: "draft"
        widget: "boolean"
        default: true
        hint: "اتركه مفعلاً حتى تنشر المقال. ألغِ التفعيل للنشر!"

      - label: "محتوى المقال *"
        name: "body"
        widget: "markdown"
        required: true
